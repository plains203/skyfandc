# Standard diagnostic sensors, identical across every SkyFanDC node.
# HA prefixes the device friendly_name, so entities appear as e.g.
# "Main Bedroom Fan WiFi Signal".

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Strength"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "CPU Temperature"
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
