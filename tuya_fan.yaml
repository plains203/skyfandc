# SkyFan DC fan - exposes a 6-speed fan entity to Home Assistant.
#
# Uses the same MCU-is-source-of-truth pattern as tuya_light.yaml:
# a guard flag starts TRUE so the fan entity's boot-time output write is
# swallowed instead of being sent to the MCU. Previously, every ESPHome
# reboot (including OTA updates) started the fan entity at "off", which
# wrote dp1 off and physically stopped a running fan until the MCU state
# dump fought it back. Now the MCU's initial datapoint dump seeds the
# entity state via sync_fan_from_mcu, which also clears the guard - an
# ESPHome update no longer touches a spinning fan.
#
# HA speed <-> MCU mapping (6 HA speeds onto mode + 5-level speed dp):
#   HA 1 -> mode Normal, dp3 speed 1
#   HA 2 -> mode Eco
#   HA 3 -> mode Normal, dp3 speed 2
#   HA 4 -> mode Normal, dp3 speed 3
#   HA 5 -> mode Normal, dp3 speed 4
#   HA 6 -> mode Normal, dp3 speed 5
#
# NOTE: the fan keeps `name: ${fan_name}` and the same component type, so
# the existing HA fan entity is preserved. The old update_fan template
# switch had no name (never an HA entity), so removing it changes nothing
# in HA.
---
substitutions:
  fan_name: "skyfan"

globals:
  # True while MCU-reported state is being pushed into the fan entity (or
  # before the first MCU state dump after boot), so output write_actions
  # don't echo it back to the MCU.
  - id: fan_mcu_sync
    type: bool
    restore_value: no
    initial_value: 'true'

fan:
  - id: skyfan
    platform: speed
    output: skyfan_speed
    direction_output: skyfan_direction
    name: ${fan_name}
    restore_mode: NO_RESTORE
    disabled_by_default: false
    speed_count: 6

output:
  # When the fan is changed from Home Assistant, translate the requested
  # speed/direction to tuyamcu datapoints.
  - id: skyfan_speed
    platform: template
    type: float
    write_action:
      - if:
          condition:
            lambda: return id(fan_mcu_sync);
          then: []  # state came FROM the MCU (or boot) - don't write back
          else:
            - logger.log:
                format: "skyfan_speed is %.2f"
                args: [ 'state' ]
            - select.set_index:
                id: datapoint_direction
                index: !lambda |-
                  return (id(skyfan).direction != FanDirection::FORWARD ? 1 : 0);
            - if:
                condition:
                  lambda: 'return state < 0.1;'
                then:
                  - switch.turn_off: datapoint_onoff
                else:
                  - switch.turn_on: datapoint_onoff
                  - if:
                      condition:
                        lambda: 'return (state < 0.3);'
                      then:
                        - select.set_index:
                            id: datapoint_mode
                            index: 0
                        - number.set:
                            id: datapoint_speed
                            value: 1
                      else:
                        - if:
                            condition:
                              lambda: 'return (state < 0.4);'
                            then:
                              - select.set_index:
                                  id: datapoint_mode
                                  index: 1
                            else:
                              - select.set_index:
                                  id: datapoint_mode
                                  index: 0
                              - if:
                                  condition:
                                    lambda: 'return (state < 0.6);'
                                  then:
                                    - number.set:
                                        id: datapoint_speed
                                        value: 2
                                  else:
                                    - if:
                                        condition:
                                          lambda: 'return (state < 0.8);'
                                        then:
                                          - number.set:
                                              id: datapoint_speed
                                              value: 3
                                        else:
                                          - if:
                                              condition:
                                                lambda: 'return (state < 0.9);'
                                              then:
                                                - number.set:
                                                    id: datapoint_speed
                                                    value: 4
                                              else:
                                                - number.set:
                                                    id: datapoint_speed
                                                    value: 5

  - id: skyfan_direction
    platform: template
    type: binary
    write_action: []  # direction is handled inside skyfan_speed's write

# --- MCU -> HA feedback (wall remote / RF remote / power-cycle) -----------

tuya:
  id: tuyamcu
  on_datapoint_update:
    - sensor_datapoint: 1
      datapoint_type: bool
      then:
        - script.execute: sync_fan_from_mcu
    - sensor_datapoint: 2
      datapoint_type: enum
      then:
        - script.execute: sync_fan_from_mcu
    - sensor_datapoint: 3
      datapoint_type: int
      then:
        - script.execute: sync_fan_from_mcu
    - sensor_datapoint: 8
      datapoint_type: enum
      then:
        - script.execute: sync_fan_from_mcu
    - sensor_datapoint: 22
      datapoint_type: enum
      then: []

script:
  - id: sync_fan_from_mcu
    mode: restart  # coalesce bursts of datapoint updates into one sync
    then:
      - delay: 150ms
      - globals.set:
          id: fan_mcu_sync
          value: 'true'
      - if:
          condition:
            switch.is_on: datapoint_onoff
          then:
            - fan.turn_on:
                id: skyfan
                speed: !lambda |-
                  // Eco mode presents as HA speed 2
                  if (id(datapoint_mode).active_index().value_or(0) == 1)
                    return 2;
                  float dp = id(datapoint_speed).state;
                  if (isnan(dp) || dp <= 1.0f)
                    return 1;
                  int s = (int) dp + 1;   // dp 2..5 -> HA 3..6
                  if (s > 6) s = 6;
                  return s;
                direction: !lambda |-
                  bool rev = ( id(datapoint_direction).active_index().value_or(0) != 0 );
                  return rev ? FanDirection::REVERSE : FanDirection::FORWARD;
          else:
            - fan.turn_off: skyfan
      # Let the fan finish writing its outputs (suppressed by the guard)
      # before re-enabling MCU writes.
      - delay: 100ms
      - globals.set:
          id: fan_mcu_sync
          value: 'false'

# --- Datapoint entities ----------------------------------------------------

switch:
  - id: datapoint_onoff
    platform: tuya
    tuya_id: tuyamcu
    name: ${fan_name} Switch
    switch_datapoint: 1
    internal: true

select:
  - id: datapoint_mode
    platform: tuya
    tuya_id: tuyamcu
    name: ${fan_name} Mode
    enum_datapoint: 2
    entity_category: config
    options:
      0: Normal
      1: Eco
      2: Sleep
    disabled_by_default: false

  - id: datapoint_direction
    platform: tuya
    tuya_id: tuyamcu
    name: ${fan_name} Direction
    enum_datapoint: 8
    options:
      0: Forward
      1: Reverse
    internal: true

  - id: datapoint_timer
    platform: tuya
    tuya_id: tuyamcu
    name: ${fan_name} Timer
    enum_datapoint: 22
    entity_category: config
    options:
      0: NIL
      1: 1_HOUR
      2: 2_HOUR
      3: 3_HOUR
      4: 4_HOUR
      5: 5_HOUR
      6: 6_HOUR
      7: 7_HOUR
      8: 8_HOUR
      9: 9_HOUR
      10: 10_HOUR
      11: 11_HOUR
      12: 12_HOUR
    disabled_by_default: true

number:
  - id: datapoint_speed
    platform: tuya
    tuya_id: tuyamcu
    name: ${fan_name} Speed
    number_datapoint: 3
    min_value: 0
    max_value: 5
    step: 1
    internal: true
